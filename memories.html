<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memories — Myles's Bachelor Party</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/inner.css">
</head>
<body>

  <!-- Start Overlay -->
  <div class="start-overlay" id="startOverlay">
    <h2>Memories</h2>
    <div class="gold-divider"><span class="ornament">◆</span></div>
    <p>Click anywhere to begin the slideshow</p>
    <p style="margin-top:8px; font-size:0.7rem; color:var(--text-muted);">
      <a href="index.html" style="color:var(--text-muted);">← Back to Hub</a>
    </p>
  </div>

  <!-- Slideshow Container -->
  <div class="slideshow-container" id="slideshow">
    <div id="slidesWrapper"></div>
    <div class="quote-overlay" id="quoteOverlay">
      <div class="quote-overlay-inner">
        <div class="quote-overlay-mark">&ldquo;</div>
        <div class="quote-overlay-text" id="quoteOverlayText"></div>
        <div class="quote-overlay-endmark">&ldquo;</div>
        <div class="quote-overlay-author" id="quoteOverlayAuthor"></div>
      </div>
    </div>
  </div>

  <!-- Controls Overlay -->
  <div class="slideshow-overlay" id="controlsOverlay" style="display:none;">
    <!-- Back link -->
    <a href="index.html" style="position:fixed; top:20px; left:20px; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); z-index:102; pointer-events:all;">← Hub</a>

    <!-- Music Player -->
    <div class="music-player" id="musicPlayer">
      <button class="play-pause" id="playPauseBtn">▶</button>
      <div class="track-info">
        <div class="track-name" id="trackName">Loading...</div>
        <div class="music-progress" id="musicProgress">
          <div class="music-progress-fill" id="musicProgressFill"></div>
        </div>
      </div>
    </div>

    <!-- Slide Controls -->
    <div class="slideshow-controls">
      <button class="slide-btn" id="prevBtn">‹</button>
      <div class="slide-dots" id="slideDots"></div>
      <button class="slide-btn" id="nextBtn">›</button>
    </div>
  </div>

  <script src="config/music.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getFirestore, collection, getDocs, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBFxIU0P2v1nFFBVdvTAqjh86-duehVfdI",
      authDomain: "bach-party-photos.firebaseapp.com",
      projectId: "bach-party-photos",
      storageBucket: "bach-party-photos.firebasestorage.app",
      messagingSenderId: "818312719919",
      appId: "1:818312719919:web:c988eb056286e2b01be0da"
    };

    const SLIDE_DURATION = 10500;

    let photos = [];
    let quotes = [];
    let currentSlide = 0;
    let slideInterval = null;
    let audio = null;
    let slideQuoteShow, slideQuoteHide;

    // Initialize Firebase once — both loaders share this instance
    let firestoreDb = null;
    try {
      const app = initializeApp(firebaseConfig);
      firestoreDb = getFirestore(app);
    } catch (e) {
      console.log('Firebase init failed, using localStorage');
    }

    async function loadPhotos() {
      if (firestoreDb) {
        try {
          const q = query(collection(firestoreDb, 'photos'), orderBy('timestamp', 'desc'));
          const snap = await getDocs(q);
          snap.forEach(doc => photos.push(doc.data()));
        } catch (e) {
          console.log('Photos: Firestore unavailable, using localStorage');
        }
      }

      const local = JSON.parse(localStorage.getItem('mbp_photos') || '[]');
      const urls = new Set(photos.map(p => p.url));
      local.forEach(p => { if (!urls.has(p.url)) photos.push(p); });

      if (photos.length === 0) {
        photos = [
          { url: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect fill="#0c1014" width="800" height="600"/><text x="400" y="280" text-anchor="middle" fill="#c9a55a" font-size="24" font-family="Georgia">Upload photos first</text><text x="400" y="320" text-anchor="middle" fill="#685f50" font-size="14" font-family="sans-serif">Head to the Photos page to get started</text></svg>'), name: 'placeholder' }
        ];
      }

      buildSlides();
    }

    async function loadQuotes() {
      if (firestoreDb) {
        try {
          const q = query(collection(firestoreDb, 'quotes'), orderBy('timestamp', 'desc'));
          const snap = await getDocs(q);
          snap.forEach(doc => quotes.push(doc.data()));
        } catch (e) {
          console.log('Quotes: Firestore unavailable, using localStorage');
        }
      }

      const local = JSON.parse(localStorage.getItem('mbp_quotes') || '[]');
      const seen = new Set(quotes.map(q => (q.text || '') + '|' + (q.author || '')));
      local.forEach(q => {
        const k = (q.text || '') + '|' + (q.author || '');
        if (!seen.has(k)) quotes.push(q);
      });
    }

    const KB_CLASSES = ['kb-1','kb-2','kb-3','kb-4','kb-5','kb-6'];

    function randomKb() {
      return KB_CLASSES[Math.floor(Math.random() * KB_CLASSES.length)];
    }

    function buildSlides() {
      const wrapper = document.getElementById('slidesWrapper');
      const dots = document.getElementById('slideDots');
      wrapper.innerHTML = '';
      dots.innerHTML = '';

      photos.forEach((photo, i) => {
        const slide = document.createElement('div');
        const kb = randomKb();
        slide.className = 'slide ' + kb + (i === 0 ? ' active' : '');
        slide.innerHTML = `
          <div class="slide-bg" style="background-image:url('${photo.url}')"></div>
          <img src="${photo.url}" alt="${photo.name || 'Memory'}">
        `;
        wrapper.appendChild(slide);

        const dot = document.createElement('div');
        dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dots.appendChild(dot);
      });
    }

    function goToSlide(index) {
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.slide-dot');
      slides[currentSlide]?.classList.remove('active');
      dots[currentSlide]?.classList.remove('active');
      currentSlide = (index + photos.length) % photos.length;

      const slide = slides[currentSlide];
      KB_CLASSES.forEach(c => slide.classList.remove(c));
      slide.classList.add(randomKb());
      const img = slide.querySelector('img');
      if (img) { img.style.animation = 'none'; void img.offsetWidth; img.style.animation = ''; }

      slide.classList.add('active');
      dots[currentSlide]?.classList.add('active');

      scheduleSlideQuote();
    }

    function scheduleSlideQuote() {
      clearTimeout(slideQuoteShow);
      clearTimeout(slideQuoteHide);

      const overlay = document.getElementById('quoteOverlay');
      overlay.classList.remove('visible');

      if (!quotes || quotes.length === 0) return;

      if (quoteIndex >= quoteShuffle.length) shuffleQuotes();
      const q = quoteShuffle[quoteIndex++];
      if (!q) return;

      const textEl = document.getElementById('quoteOverlayText');
      const authorEl = document.getElementById('quoteOverlayAuthor');
      textEl.innerHTML = escapeHtml(q.text);
      authorEl.innerHTML = q.author
        ? '— ' + escapeHtml(q.author)
        : '— <em style="text-decoration:line-through;">redacted</em>';
      authorEl.style.display = '';

      // +0.5s: quote fades in (1.5s transition = fully visible at 2s)
      // +8s: quote fades out (1.5s transition = gone at 9.5s)
      // +10.5s: slide changes (1s after quote fully gone)
      slideQuoteShow = setTimeout(() => overlay.classList.add('visible'), 500);
      slideQuoteHide = setTimeout(() => overlay.classList.remove('visible'), 8000);
    }

    function nextSlide() { goToSlide(currentSlide + 1); }
    function prevSlide() { goToSlide(currentSlide - 1); }

    function startSlideshow() {
      if (slideInterval) clearInterval(slideInterval);
      slideInterval = setInterval(nextSlide, SLIDE_DURATION);
    }

    // ===== Quotes over slideshow =====
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    let quoteShuffle = [];
    let quoteIndex = 0;

    function shuffleQuotes() {
      quoteShuffle = quotes.slice();
      for (let i = quoteShuffle.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [quoteShuffle[i], quoteShuffle[j]] = [quoteShuffle[j], quoteShuffle[i]];
      }
      quoteIndex = 0;
    }

    function startQuotes() {
      if (quotes.length > 0) shuffleQuotes();
      // First quote triggered by scheduleSlideQuote() inside goToSlide on start
    }

    // Music
    function initMusic() {
      if (typeof MUSIC_TRACKS === 'undefined' || MUSIC_TRACKS.length === 0) {
        document.getElementById('trackName').textContent = 'No tracks available';
        return;
      }

      const track = getRandomTrack();
      if (!track) return;

      audio = new Audio(track.file);
      audio.loop = true;
      document.getElementById('trackName').textContent = track.title;

      const playPauseBtn = document.getElementById('playPauseBtn');
      const progressFill = document.getElementById('musicProgressFill');

      audio.play().catch(() => {});

      playPauseBtn.onclick = () => {
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
      };

      audio.addEventListener('play',  () => { playPauseBtn.textContent = '⏸'; });
      audio.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });
      audio.addEventListener('error', () => { playPauseBtn.textContent = '▶'; console.warn('Audio failed to load:', track.file); });

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        }
      });

      document.getElementById('musicProgress').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
      };
    }

    // Start
    document.getElementById('startOverlay').onclick = () => {
      document.getElementById('startOverlay').classList.add('hidden');
      document.getElementById('controlsOverlay').style.display = '';
      if (quotes.length > 0) shuffleQuotes();
      startSlideshow();
      scheduleSlideQuote();
      initMusic();
    };

    document.getElementById('prevBtn').onclick = () => {
      prevSlide();
      startSlideshow(); // Reset timer
    };

    document.getElementById('nextBtn').onclick = () => {
      nextSlide();
      startSlideshow();
    };

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('startOverlay').classList.contains('hidden')) {
        if (e.key === 'ArrowRight') { nextSlide(); startSlideshow(); }
        if (e.key === 'ArrowLeft') { prevSlide(); startSlideshow(); }
        if (e.key === ' ') {
          e.preventDefault();
          if (audio) {
            audio.paused ? audio.play() : audio.pause();
          }
        }
      }
    });

    loadPhotos();
    loadQuotes();
  </script>
</body>
</html>
