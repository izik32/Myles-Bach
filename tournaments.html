<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournaments — Myles's Bachelor Party</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/inner.css">
</head>
<body>

  <div class="bokeh-container">
    <div class="bokeh-orb"></div>
    <div class="bokeh-orb"></div>
    <div class="bokeh-orb"></div>
    <div class="bokeh-orb"></div>
  </div>

  <div class="container">

    <header class="inner-header">
      <a href="index.html" class="back-link">← Back to Hub</a>
      <h1>Tournaments</h1>
      <p class="subtitle">Brackets &amp; Win Tracker</p>
    </header>

    <div class="gold-divider"><span class="ornament">◆</span></div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="halo3">Halo 3</button>
      <button class="tab-btn" data-tab="smash">Smash Bros</button>
      <button class="tab-btn" data-tab="mtg">MTG</button>
      <button class="tab-btn" data-tab="pool">Pool</button>
      <button class="tab-btn" data-tab="wins">Win Tracker</button>
    </div>

    <!-- Tournament Tabs -->
    <div class="tab-content active" id="tab-halo3"></div>
    <div class="tab-content" id="tab-smash"></div>
    <div class="tab-content" id="tab-mtg"></div>
    <div class="tab-content" id="tab-pool"></div>

    <!-- Win Tracker Tab -->
    <div class="tab-content" id="tab-wins">
      <div class="player-input-area">
        <input type="text" id="winPlayerInput" placeholder="Add player to tracker...">
        <button class="btn" onclick="addWinPlayer()">Add</button>
      </div>
      <div class="leader-banner" id="leaderBanner">
        <div class="leader-label">Current Leader</div>
        <div class="leader-name" id="leaderName"></div>
      </div>
      <div class="win-tracker-list" id="winTrackerList"></div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-stats">
        <span>1 Groom to Send Off</span><span>·</span>
        <span>∞ Memories Made</span><span>·</span>
        <span>Tahoe</span>
      </div>
      <div class="footer-quote">
        "I'll fight with everything I have!"<br>
        <span class="attribution">— Roy · Super Smash Bros. Melee</span>
      </div>
    </footer>

  </div>

  <script>
    // ========== Tab System ==========
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ========== Tournament Engine ==========
    const TOURNAMENTS = ['halo3', 'smash', 'mtg', 'pool'];

    function getState(key) {
      return JSON.parse(localStorage.getItem('mbp_' + key) || 'null');
    }
    function setState(key, val) {
      localStorage.setItem('mbp_' + key, JSON.stringify(val));
    }

    function initTournament(id) {
      const container = document.getElementById('tab-' + id);
      const players = getState(id + '_players') || [];
      const bracket = getState(id + '_bracket') || null;

      let html = `
        <div class="player-input-area">
          <input type="text" id="${id}_input" placeholder="Add player or team..." onkeydown="if(event.key==='Enter')addPlayer('${id}')">
          <button class="btn" onclick="addPlayer('${id}')">Add</button>
        </div>
        <div class="player-tags" id="${id}_tags"></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
          <button class="btn btn-primary" onclick="generateBracket('${id}')">Generate Bracket</button>
          <button class="btn" onclick="resetBracket('${id}')">Reset Bracket</button>
        </div>
        <div class="champion-display" id="${id}_champion">
          <div class="crown">👑</div>
          <div class="champion-name" id="${id}_champName"></div>
          <div class="champion-label">Champion</div>
        </div>
        <div class="bracket-container">
          <div class="bracket" id="${id}_bracket"></div>
        </div>
      `;
      container.innerHTML = html;

      renderTags(id, players);
      if (bracket) renderBracket(id, bracket);
    }

    function addPlayer(id) {
      const input = document.getElementById(id + '_input');
      const name = input.value.trim();
      if (!name) return;

      const players = getState(id + '_players') || [];
      if (!players.includes(name)) {
        players.push(name);
        setState(id + '_players', players);
      }
      input.value = '';
      renderTags(id, players);
    }

    function removePlayer(id, name) {
      let players = getState(id + '_players') || [];
      players = players.filter(p => p !== name);
      setState(id + '_players', players);
      renderTags(id, players);
    }

    function renderTags(id, players) {
      const container = document.getElementById(id + '_tags');
      container.innerHTML = players.map(p =>
        `<span class="player-tag">${p} <span class="remove" onclick="removePlayer('${id}','${p.replace(/'/g, "\\'")}')">×</span></span>`
      ).join('');
    }

    function generateBracket(id) {
      const players = getState(id + '_players') || [];
      if (players.length < 2) return alert('Need at least 2 players');

      // Pad to next power of 2
      const size = Math.pow(2, Math.ceil(Math.log2(players.length)));
      const shuffled = [...players].sort(() => Math.random() - 0.5);
      while (shuffled.length < size) shuffled.push(null); // byes

      const rounds = Math.log2(size);
      const bracket = [];

      // First round
      const firstRound = [];
      for (let i = 0; i < shuffled.length; i += 2) {
        const match = { p1: shuffled[i], p2: shuffled[i + 1], winner: null };
        // Auto-advance byes
        if (match.p1 && !match.p2) match.winner = match.p1;
        if (!match.p1 && match.p2) match.winner = match.p2;
        firstRound.push(match);
      }
      bracket.push(firstRound);

      // Subsequent rounds
      for (let r = 1; r < rounds; r++) {
        const prevRound = bracket[r - 1];
        const round = [];
        for (let i = 0; i < prevRound.length; i += 2) {
          round.push({
            p1: prevRound[i].winner,
            p2: prevRound[i + 1] ? prevRound[i + 1].winner : null,
            winner: null
          });
        }
        bracket.push(round);
      }

      setState(id + '_bracket', bracket);
      renderBracket(id, bracket);
    }

    function renderBracket(id, bracket) {
      const container = document.getElementById(id + '_bracket');
      const roundNames = ['Round 1', 'Quarterfinals', 'Semifinals', 'Finals', 'Grand Finals'];

      let html = '';
      bracket.forEach((round, rIdx) => {
        const name = bracket.length <= 3
          ? ['Round 1', 'Semifinals', 'Finals'][rIdx] || `Round ${rIdx + 1}`
          : roundNames[rIdx] || `Round ${rIdx + 1}`;

        html += `<div class="bracket-round"><div class="bracket-round-title">${name}</div>`;
        round.forEach((match, mIdx) => {
          html += `<div class="match">`;
          html += renderSlot(id, rIdx, mIdx, 'p1', match.p1, match.winner);
          html += renderSlot(id, rIdx, mIdx, 'p2', match.p2, match.winner);
          html += `</div>`;
        });
        html += `</div>`;
      });

      container.innerHTML = html;

      // Check champion
      const finalRound = bracket[bracket.length - 1];
      const champDisplay = document.getElementById(id + '_champion');
      if (finalRound.length === 1 && finalRound[0].winner) {
        document.getElementById(id + '_champName').textContent = finalRound[0].winner;
        champDisplay.classList.add('visible');
      } else {
        champDisplay.classList.remove('visible');
      }
    }

    function renderSlot(id, rIdx, mIdx, slot, player, winner) {
      if (!player) {
        return `<div class="match-slot empty">TBD</div>`;
      }
      const isWinner = winner === player;
      const cls = isWinner ? 'match-slot winner' : 'match-slot';
      return `<div class="${cls}" onclick="selectWinner('${id}',${rIdx},${mIdx},'${slot}')">${player}</div>`;
    }

    function selectWinner(id, rIdx, mIdx, slot) {
      const bracket = getState(id + '_bracket');
      if (!bracket) return;

      const match = bracket[rIdx][mIdx];
      const winner = match[slot];
      if (!winner) return;

      match.winner = winner;

      // Clear downstream
      for (let r = rIdx + 1; r < bracket.length; r++) {
        bracket[r].forEach(m => {
          if (m.p1 === null && m.p2 === null) return;
        });
      }

      // Propagate winner to next round
      if (rIdx + 1 < bracket.length) {
        const nextMatchIdx = Math.floor(mIdx / 2);
        const nextSlot = mIdx % 2 === 0 ? 'p1' : 'p2';
        const nextMatch = bracket[rIdx + 1][nextMatchIdx];

        // Clear old winner from downstream if it changed
        const oldPlayer = nextMatch[nextSlot];
        if (oldPlayer !== winner) {
          clearDownstream(bracket, rIdx + 1, nextMatchIdx, nextSlot);
        }

        nextMatch[nextSlot] = winner;
      }

      setState(id + '_bracket', bracket);
      renderBracket(id, bracket);
    }

    function clearDownstream(bracket, rIdx, mIdx, slot) {
      if (rIdx >= bracket.length) return;
      const match = bracket[rIdx][mIdx];
      const oldPlayer = match[slot];
      match[slot] = null;
      if (match.winner === oldPlayer) {
        match.winner = null;
        // Continue clearing
        if (rIdx + 1 < bracket.length) {
          const nextMIdx = Math.floor(mIdx / 2);
          const nextSlot = mIdx % 2 === 0 ? 'p1' : 'p2';
          clearDownstream(bracket, rIdx + 1, nextMIdx, nextSlot);
        }
      }
    }

    function resetBracket(id) {
      localStorage.removeItem('mbp_' + id + '_bracket');
      document.getElementById(id + '_bracket').innerHTML = '';
      document.getElementById(id + '_champion').classList.remove('visible');
    }

    // ========== Win Tracker ==========
    function getWins() {
      return getState('wins') || {};
    }

    function setWins(data) {
      setState('wins', data);
    }

    function addWinPlayer() {
      const input = document.getElementById('winPlayerInput');
      const name = input.value.trim();
      if (!name) return;

      const wins = getWins();
      if (!(name in wins)) {
        wins[name] = 0;
        setWins(wins);
      }
      input.value = '';
      renderWinTracker();
    }

    document.getElementById('winPlayerInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addWinPlayer();
    });

    function adjustWins(name, delta) {
      const wins = getWins();
      wins[name] = Math.max(0, (wins[name] || 0) + delta);
      setWins(wins);
      renderWinTracker();
    }

    function renderWinTracker() {
      const wins = getWins();
      const sorted = Object.entries(wins).sort((a, b) => b[1] - a[1]);
      const container = document.getElementById('winTrackerList');
      const banner = document.getElementById('leaderBanner');

      if (sorted.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">Add players above to start tracking wins</p>';
        banner.classList.remove('visible');
        return;
      }

      const maxWins = sorted[0][1];

      container.innerHTML = sorted.map(([name, count], i) => `
        <div class="win-tracker-item ${i === 0 && count > 0 ? 'leader' : ''}">
          <span class="rank">${i + 1}</span>
          <span class="player-name">${name}</span>
          <div class="win-controls">
            <button onclick="adjustWins('${name.replace(/'/g, "\\'")}', -1)">−</button>
            <span class="count">${count}</span>
            <button onclick="adjustWins('${name.replace(/'/g, "\\'")}', 1)">+</button>
          </div>
        </div>
      `).join('');

      if (maxWins > 0) {
        document.getElementById('leaderName').textContent = sorted[0][0];
        banner.classList.add('visible');
      } else {
        banner.classList.remove('visible');
      }
    }

    // Init all tournaments
    TOURNAMENTS.forEach(initTournament);
    renderWinTracker();
  </script>

  <script src="js/shared.js"></script>
</body>
</html>
